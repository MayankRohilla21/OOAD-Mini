<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="mb-4">Book Appointment</h3>
        <form action="/appointments/save" method="post">
            <div class="mb-3">
                <label class="form-label">Patient Name</label>
                <input type="text" name="patientName" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Doctor Name</label>
                <input type="text" name="doctorName" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Appointment Date</label>
                <input type="date" name="appointmentDate" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Slot Time</label>
                <input type="time" name="slotTime" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Reason</label>
                <input type="text" name="reason" class="form-control">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Book</button>
                <a href="/appointments" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
