<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Appointment Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-3 text-center">Appointment Management</h2>

        <div class="mb-3 d-flex gap-2">
            <a href="/appointments/new" class="btn btn-primary">Book Appointment</a>
            <a href="/appointments/schedules" class="btn btn-secondary">Doctor Availability</a>
            <a href="/consultations" class="btn btn-outline-dark">Consultations</a>
            <a href="/billing" class="btn btn-outline-dark">Billing</a>
            <a href="/inventory" class="btn btn-outline-dark">Inventory</a>
            <a href="/reports" class="btn btn-outline-dark">Reports</a>
        </div>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Appointment ID</th>
                    <th>Patient Name</th>
                    <th>Doctor Name</th>
                    <th>Date</th>
                    <th>Slot</th>
                    <th>Status</th>
                    <th>Reason</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a : ${appointments}">
                    <td th:text="${a.appointmentId}"></td>
                    <td th:text="${a.patientName}"></td>
                    <td th:text="${a.doctorName}"></td>
                    <td th:text="${a.appointmentDate}"></td>
                    <td th:text="${a.slotTime}"></td>
                    <td th:text="${a.status}"></td>
                    <td th:text="${a.reason}"></td>
                    <td class="d-flex gap-2">
                        <a th:href="@{/appointments/reschedule/{id}(id=${a.appointmentId})}"
                            class="btn btn-sm btn-warning" th:if="${a.status != 'CANCELLED'}">Reschedule</a>
                        <a th:href="@{/appointments/cancel/{id}(id=${a.appointmentId})}" class="btn btn-sm btn-danger"
                            th:if="${a.status != 'CANCELLED'}">Cancel</a>
                        <span th:if="${a.status == 'CANCELLED'}" class="text-muted">Cancelled</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
