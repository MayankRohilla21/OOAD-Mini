<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Booked Slots</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h3 class="mb-3">Booked Slots</h3>
    <p>
        Doctor Name: <strong th:text="${doctorName}"></strong> |
        Date: <strong th:text="${appointmentDate}"></strong>
    </p>
    <ul class="list-group">
        <li class="list-group-item" th:each="slot : ${bookedSlots}" th:text="${slot}"></li>
        <li class="list-group-item text-muted" th:if="${#lists.isEmpty(bookedSlots)}">No booked slots</li>
    </ul>
    <a href="/appointments" class="btn btn-secondary mt-3">Back</a>
</div>
</body>
</html>
