<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Medicine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">🏥 Smart Clinic System</span>
        <div>
            <a href="/appointments" class="btn btn-outline-light btn-sm me-2">Appointments</a>
            <a href="/consultations" class="btn btn-outline-light btn-sm me-2">Consultations</a>
            <a href="/billing" class="btn btn-outline-light btn-sm me-2">Billing</a>
            <a href="/inventory" class="btn btn-warning btn-sm me-2">Inventory</a>
            <a href="/reports" class="btn btn-info btn-sm">Reports</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow p-4" style="max-width: 600px; margin: auto;">
        <h3 class="text-center mb-4">➕ Add Medicine to Inventory</h3>

        <form action="/inventory/save" method="post" th:object="${medicine}">

            <div class="mb-3">
                <label class="form-label fw-bold">Medicine Name *</label>
                <input type="text" name="medicineName" class="form-control"
                       th:field="*{medicineName}" required maxlength="100"
                       placeholder="e.g. Paracetamol 500mg">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Category</label>
                <select name="category" class="form-select" th:field="*{category}">
                    <option value="">-- Select Category --</option>
                    <option value="Analgesic">Analgesic</option>
                    <option value="Antibiotic">Antibiotic</option>
                    <option value="Antacid">Antacid</option>
                    <option value="Antiviral">Antiviral</option>
                    <option value="Vitamin">Vitamin</option>
                    <option value="Supplement">Supplement</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Stock Quantity *</label>
                <input type="number" name="stockQuantity" class="form-control"
                       th:field="*{stockQuantity}" required min="0"
                       placeholder="e.g. 100">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Minimum Stock Level</label>
                <input type="number" name="minStockLevel" class="form-control"
                       th:field="*{minStockLevel}" min="0"
                       placeholder="e.g. 10 (alert when stock falls below this)">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Unit Price (₹)</label>
                <input type="number" name="unitPrice" class="form-control"
                       th:field="*{unitPrice}" min="0" step="0.01"
                       placeholder="e.g. 25.50">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Expiry Date</label>
                <input type="date" name="expiryDate" class="form-control"
                       th:field="*{expiryDate}">
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a href="/inventory" class="btn btn-secondary">← Back</a>
                <button type="submit" class="btn btn-primary">💾 Save Medicine</button>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
