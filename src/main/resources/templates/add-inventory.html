<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Medicine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">🏥 Smart Clinic System</span>
        <div>
            <a href="/appointments" class="btn btn-outline-light btn-sm me-2">Appointments</a>
            <a href="/consultations" class="btn btn-outline-light btn-sm me-2">Consultations</a>
            <a href="/billing" class="btn btn-outline-light btn-sm me-2">Billing</a>
            <a href="/inventory" class="btn btn-outline-warning btn-sm me-2">Inventory</a>
            <a href="/reports" class="btn btn-outline-info btn-sm">Reports</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4" style="max-width: 600px; margin: auto;">
        <h3 class="text-center mb-4">➕ Add New Medicine</h3>

        <form action="/inventory/save" method="post" th:object="${inventory}">

            <div class="mb-3">
                <label class="form-label fw-bold">Medicine Name <span class="text-danger">*</span></label>
                <input type="text" th:field="*{medicineName}" class="form-control"
                       placeholder="e.g. Paracetamol" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Category</label>
                <select th:field="*{category}" class="form-select">
                    <option value="">-- Select Category --</option>
                    <option value="Antibiotic">Antibiotic</option>
                    <option value="Painkiller">Painkiller</option>
                    <option value="Antiviral">Antiviral</option>
                    <option value="Vitamin">Vitamin</option>
                    <option value="Antihistamine">Antihistamine</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Stock Quantity <span class="text-danger">*</span></label>
                    <input type="number" th:field="*{stockQuantity}" class="form-control"
                           min="0" placeholder="e.g. 100" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Min Stock Level</label>
                    <input type="number" th:field="*{minStockLevel}" class="form-control"
                           min="0" placeholder="e.g. 20">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Unit Price (₹)</label>
                <input type="number" th:field="*{unitPrice}" class="form-control"
                       step="0.01" min="0" placeholder="e.g. 5.50">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Expiry Date</label>
                <input type="date" th:field="*{expiryDate}" class="form-control">
            </div>

            <div class="d-flex justify-content-between mt-3">
                <a href="/inventory" class="btn btn-secondary">← Back</a>
                <button type="submit" class="btn btn-primary">Save Medicine</button>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
