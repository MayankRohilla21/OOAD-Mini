<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Bill</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h3 class="text-center mb-4">🧾 Generate Bill</h3>

        <form action="/billing/save" method="post">

            <div class="mb-3">
                <label>Consultation ID</label>
                <input type="number" name="consultationId"
                       th:value="${bill.consultationId}"
                       class="form-control" readonly>
            </div>

            <div class="mb-3">
                <label>Consultation Fee</label>
                <input type="number" name="consultationFee" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Medicine Charges</label>
                <input type="number" name="medicineCharges" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Lab Charges</label>
                <input type="number" name="labCharges" class="form-control" required>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/billing" class="btn btn-secondary">Back</a>
                <a href="/consultations" class="btn btn-secondary">← Back to Consultations</a>
                <button type="submit" class="btn btn-primary">Generate Bill</button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
