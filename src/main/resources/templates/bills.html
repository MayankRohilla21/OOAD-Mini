<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">🏥 Smart Clinic System</span>

        <div>
            <a href="/appointments" class="btn btn-outline-light btn-sm me-2">Appointments</a>
            <a href="/consultations" class="btn btn-outline-light btn-sm me-2">Consultations</a>
            <a href="/billing" class="btn btn-outline-light btn-sm me-2">Billing</a>
            <a href="/inventory" class="btn btn-outline-light btn-sm me-2">Inventory</a>
            <a href="/reports" class="btn btn-outline-warning btn-sm">Reports</a>
        </div>
    </div>
</nav>

<head>
    <title>Billing Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <h2 class="mb-4 text-center">💳 Billing Dashboard</h2>

        <div class="d-flex justify-content-between mb-3">
            <h5>All Bills</h5>
            <a href="/billing/new" class="btn btn-primary">+ Generate Bill</a>
        </div>
        <a href="/billing/payments" class="btn btn-dark">View Payments</a>
        <table class="table table-striped table-bordered shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Consultation ID</th>
                    <th>Total Amount</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="bill : ${bills}">
                    <td th:text="${bill.id}"></td>
                    <td th:text="${bill.consultationId}"></td>
                    <td>₹ <span th:text="${bill.totalAmount}"></span></td>

                    <td>
                        <span th:if="${bill.status == 'PENDING'}" class="badge bg-warning text-dark">PENDING</span>
                        <span th:if="${bill.status == 'PAID'}" class="badge bg-success">PAID</span>
                    </td>

                    <td>
                        <form action="/billing/pay" method="post" class="d-flex">
                            <input type="hidden" name="billId" th:value="${bill.id}">
                            <input type="hidden" name="amount" th:value="${bill.totalAmount}">
                            <input type="hidden" name="method" value="CASH">

                            <button type="submit" class="btn btn-success btn-sm" th:if="${bill.status == 'PENDING'}">
                                Pay
                            </button>

                            <span th:if="${bill.status == 'PAID'}" class="text-success">✔ Done</span>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</body>

</html>
