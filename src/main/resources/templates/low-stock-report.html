<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Low Stock Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-4">
        <h2 class="mb-3">Low Stock Report</h2>

        <form method="get" action="/reports/low-stock" class="row g-2 mb-3">
            <div class="col-md-3">
                <label class="form-label">Low Stock Threshold</label>
                <input type="number" min="1" class="form-control" name="threshold" th:value="${threshold}">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" type="submit">Generate</button>
            </div>
        </form>

        <div class="alert alert-warning">
            Total low stock items: <strong th:text="${lowStockReport.lowStockItems}">0</strong>
        </div>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Medicine</th>
                    <th>Quantity</th>
                    <th>Expiry Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${lowStockItems}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.medicineName}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.expiryDate}"></td>
                    <td th:text="${item.status}"></td>
                </tr>
            </tbody>
        </table>

        <div class="d-flex gap-2 mt-3">
            <a href="/reports" class="btn btn-secondary">Back to Reports</a>
            <a href="/inventory" class="btn btn-dark">Go To Inventory</a>
        </div>
    </div>
</body>

</html>
