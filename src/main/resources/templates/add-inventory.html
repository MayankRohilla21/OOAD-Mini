<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h3 class="mb-4">Add Inventory Item</h3>
            <form action="/inventory/save" method="post" th:object="${inventory}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Medicine Name</label>
                        <input type="text" th:field="*{medicineName}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Batch No</label>
                        <input type="text" th:field="*{batchNo}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Quantity</label>
                        <input type="number" min="0" th:field="*{quantity}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Unit Price</label>
                        <input type="number" min="0" step="0.01" th:field="*{unitPrice}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Expiry Date</label>
                        <input type="date" th:field="*{expiryDate}" class="form-control" required>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Supplier Name</label>
                        <input type="text" th:field="*{supplierName}" class="form-control" required>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a href="/inventory" class="btn btn-secondary">Back</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
