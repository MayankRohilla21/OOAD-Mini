<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reschedule Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="mb-4">Reschedule Appointment</h3>
        <form action="/appointments/reschedule" method="post">
            <input type="hidden" name="appointmentId" th:value="${appointmentId}">
            <div class="mb-3">
                <label class="form-label">New Date</label>
                <input type="date" name="appointmentDate" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">New Slot Time</label>
                <input type="time" name="slotTime" class="form-control" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning">Reschedule</button>
                <a href="/appointments" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
