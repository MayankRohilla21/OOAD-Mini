<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Consultations</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>
    <div class="container">

        <h1>Consultation List</h1>

        <a href="/consultations/new">Add Consultation</a>
        <a href="/appointments">Appointments</a>
        <a href="/prescriptions/new">Add Prescription</a>
        <a href="/prescriptions">Prescription History</a>
        <a href="/billing"
           style="background-color:black; color:white; padding:6px 12px; border-radius:5px; text-decoration:none;">
           To Billing
        </a>
        <a href="/inventory"
           style="background-color:#d97706; color:white; padding:6px 12px; border-radius:5px; text-decoration:none;">
           Inventory
        </a>
        <a href="/reports"
           style="background-color:#0891b2; color:white; padding:6px 12px; border-radius:5px; text-decoration:none;">
           Reports
        </a>

        <table>
            <tr>
                <th>ID</th>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            <tr th:each="c : ${consultations}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.patientName}"></td>
                <td th:text="${c.doctorName}"></td>

                <td>

                    <!-- Consultation Status -->
                    <div>
                        <span th:if="${c.status == 'Completed'}" th:text="${c.status}" class="done"></span>
                        <span th:if="${c.status != 'Completed'}" th:text="${c.status}" class="pending"></span>
                    </div>

                    <!-- Payment Status -->
                    <div th:if="${billingService.isBillPaid(c.id)}"
                         style="color:green; font-weight:bold;">
                        Paid ✔
                    </div>

                    <div th:if="${!billingService.isBillPaid(c.id)}"
                         style="color:orange;">
                        Not Paid
                    </div>

                </td>

                <td>
                    <a th:href="@{/consultations/edit/{id}(id=${c.id})}">Edit</a>
                    <a th:href="@{/consultations/delete/{id}(id=${c.id})}">Delete</a>
                    <a th:if="${c.status == 'Completed'}"
                       th:href="@{/billing/from-consultation/{id}(id=${c.id})}"
                       style="background-color:#5bc0de; color:white; padding:4px 8px; border-radius:4px; text-decoration:none;">
                       Generate Bill
                    </a>

                    <a th:if="${c.status != 'Completed'}" th:href="@{/consultations/complete/{id}(id=${c.id})}">
                        Complete
                    </a>

                    <span th:if="${c.status == 'Completed'}">Done</span>
                </td>
            </tr>
        </table>

    </div>
</body>

</html>
