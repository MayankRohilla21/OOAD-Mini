<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">🏥 Smart Clinic System</span>

        <div>
            <a href="/consultations" class="btn btn-outline-light btn-sm me-2">Consultations</a>
            <a href="/billing" class="btn btn-outline-light btn-sm me-2">Billing</a>
            <a href="/inventory" class="btn btn-warning btn-sm me-2">Inventory</a>
            <a href="/reports" class="btn btn-info btn-sm">Reports</a>
        </div>
    </div>
</nav>
<head>
    <title>Payment History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4 text-center">💰 Payment History</h2>

    <div class="d-flex justify-content-between mb-3">
        <a href="/billing" class="btn btn-secondary">← Back to Billing</a>
    </div>

    <table class="table table-striped table-bordered shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Bill ID</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Payment Method</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${payments}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.billId}"></td>
            <td>₹ <span th:text="${p.amount}"></span></td>
            <td>
                <span th:if="${p.status == 'PAID'}" class="badge bg-success">PAID</span>
                <span th:if="${p.status == 'PENDING'}" class="badge bg-warning text-dark">PENDING</span>
            </td>
            <td th:text="${p.paymentMethod}"></td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
