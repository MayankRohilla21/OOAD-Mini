<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Inventory Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Smart Clinic System</span>
            <div>
                <a href="/appointments" class="btn btn-outline-light btn-sm me-2">Appointments</a>
                <a href="/consultations" class="btn btn-outline-light btn-sm me-2">Consultations</a>
                <a href="/billing" class="btn btn-outline-light btn-sm me-2">Billing</a>
                <a href="/reports" class="btn btn-outline-warning btn-sm">Reports</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-3">Inventory Management</h2>

        <div class="d-flex flex-wrap gap-2 mb-3">
            <a href="/inventory/new" class="btn btn-primary">Add Medicine</a>
            <a href="/inventory/remove-expired" class="btn btn-danger">Remove Expired Items</a>
            <a href="/reports/low-stock" class="btn btn-warning">Low Stock Alert</a>
            <a href="/reports" class="btn btn-dark">Reports Dashboard</a>
        </div>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Medicine</th>
                    <th>Batch</th>
                    <th>Quantity</th>
                    <th>Unit Price</th>
                    <th>Expiry Date</th>
                    <th>Supplier</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.medicineName}"></td>
                    <td th:text="${item.batchNo}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td>INR <span th:text="${item.unitPrice}"></span></td>
                    <td th:text="${item.expiryDate}"></td>
                    <td th:text="${item.supplierName}"></td>
                    <td>
                        <span th:if="${item.status == 'IN_STOCK'}" class="badge bg-success">IN STOCK</span>
                        <span th:if="${item.status == 'LOW_STOCK'}" class="badge bg-warning text-dark">LOW STOCK</span>
                        <span th:if="${item.status == 'OUT_OF_STOCK'}" class="badge bg-danger">OUT OF STOCK</span>
                        <span th:if="${item.status == 'EXPIRED'}" class="badge bg-secondary">EXPIRED</span>
                    </td>
                    <td class="d-flex gap-2">
                        <a th:href="@{/inventory/edit/{id}(id=${item.id})}"
                            class="btn btn-sm btn-info text-white">Edit</a>
                        <a th:href="@{/inventory/delete/{id}(id=${item.id})}"
                            class="btn btn-sm btn-outline-danger">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
