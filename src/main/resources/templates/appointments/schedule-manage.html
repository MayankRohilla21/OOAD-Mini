<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Availability</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-3">Doctor Availability Setup</h2>

    <div class="card p-4 shadow mb-4">
        <h5>Add Available Slot</h5>
        <form action="/appointments/schedules/save" method="post" class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Doctor Name</label>
                <input type="text" name="doctorName" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Date</label>
                <input type="date" name="availableDate" class="form-control" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Start Time</label>
                <input type="time" name="startTime" class="form-control" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">End Time</label>
                <input type="time" name="endTime" class="form-control" required>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">Add Slot</button>
            </div>
        </form>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>Schedule ID</th>
            <th>Doctor Name</th>
            <th>Date</th>
            <th>Start</th>
            <th>End</th>
            <th>Available</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${schedules}">
            <td th:text="${s.scheduleId}"></td>
            <td th:text="${s.doctorName}"></td>
            <td th:text="${s.availableDate}"></td>
            <td th:text="${s.startTime}"></td>
            <td th:text="${s.endTime}"></td>
            <td th:text="${s.available ? 'YES' : 'NO'}"></td>
            <td>
                <a th:if="${s.available}" th:href="@{/appointments/schedules/unavailable/{id}(id=${s.scheduleId})}"
                   class="btn btn-sm btn-danger">Mark Unavailable</a>
                <span th:if="${!s.available}" class="text-muted">Unavailable</span>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/appointments" class="btn btn-secondary">Back to Appointments</a>
</div>
</body>
</html>
